<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productivity Dashboard</title>
    <link
      rel="shortcut icon"
      href="./android-chrome-192x192.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="main">
      <section class="allElems">
        <header>
          
        </header>
        <div class="allFeatures">
          <div class="todo elem" id="0">
            <img
              src="https://images.unsplash.com/photo-1598791318878-10e76d178023?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt=""
            />
            <h2>To Do List</h2>
          </div>
          <div class="daily elem" id="1">
            <img
              src="https://plus.unsplash.com/premium_photo-1705010663785-4e8838166217?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt=""
            />
            <h2>Daily Planner</h2>
          </div>
          <div class="moti elem" id="2">
            <img
              src="https://plus.unsplash.com/premium_photo-1674489620667-eaf4a0094996?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt=""
            />
            <h2>Motivation</h2>
          </div>
          <div class="promo elem" id="3">
            <img
              src="https://plus.unsplash.com/premium_photo-1673607868705-8806cb5a4848?q=80&w=1172&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt=""
            />
            <h2>Pomodoro Timer</h2>
          </div>
          <div class="goals elem" id="4">
            <img
              src="https://images.unsplash.com/photo-1622993361017-180360aea82c?q=80&w=1120&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt=""
            />
            <h2>Daily Goals</h2>
          </div>
        </div>
      </section>

      <section class="fullElem to-do-list-full-page">
        <button class="back" id="0"><i class="ri-close-line"></i></button>
        <h2>Your Personalised Task List</h2>

        <div class="todo-container">
          <div class="addTask">
            <form>
              <input id="task-input" type="text" placeholder="Enter task" />
              <textarea
                placeholder="Enter Details"
                name=""
                id=""
                cols="30"
                rows="10"
              ></textarea>
              <div class="mark-imp">
                <input type="checkbox" name="" id="check" />
                <label for="check">Mark as Important</label>
              </div>
              <button>Add Task</button>
            </form>
          </div>
          <div class="allTask"></div>
        </div>
      </section>

      <section class="fullElem daily-planner-full-page">
        <button class="back" id="1"><i class="ri-close-line"></i></button>
        <h2>Plan Your Day to be More Productive</h2>

        <div class="day-planner"></div>
      </section>

      <section class="fullElem motivation-full-page">
        <button class="back" id="2"><i class="ri-close-line"></i></button>
        <h1>Motivation</h1>
        <div class="motivation-container">
          <div class="motivation-wrapper">
            <div class="motivation-1">
              <img src="./icons8-quotes-64.png" alt="" />
              <h2>Quote of the Day</h2>
            </div>
            <div class="motivation-2">
              <p></p>
            </div>
            <div class="motivation-3">
              <h2></h2>
            </div>
          </div>
        </div>
      </section>

      <section class="fullElem pomodoro-timer-full-page">
        <button class="back" id="3"><i class="ri-close-line"></i></button>
        <h1>Study With Me!</h1>

        <h4 class="session">Working Session</h4>

        <div class="pomo-timer">
          <h2>25:00</h2>

          <button class="start-timer">Start</button>
          <button class="pause-timer">Pause</button>
          <button class="reset-timer">Reset</button>
        </div>
      </section>

      <section class="fullElem daily-goals-full-page">
        <button class="back" id="4"><i class="ri-close-line"></i></button>
        <h1>Daily Goals</h1>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
